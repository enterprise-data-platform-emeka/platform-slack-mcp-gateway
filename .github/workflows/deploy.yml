name: Deploy

# Deploys the Slack MCP Gateway to ECS Fargate.
#
# AWS authentication uses OIDC. No long-lived AWS access keys are stored in
# GitHub secrets. The Slack tokens are stored in this repository's GitHub
# secrets and copied into AWS Secrets Manager for the ECS task at deploy time.
#
# Prerequisites:
#   1. terraform-bootstrap has allowed this repository in GitHub OIDC trust.
#   2. terraform-platform-infra-live has created the Slack MCP ECS/ECR resources.
#   3. terraform-github-setup has created environments and AWS_ACCOUNT_ID here.
#
# Triggers:
#   - workflow_run (CI passes on main) -> auto deploys to dev
#   - workflow_dispatch                -> manually deploys to dev/staging/prod

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}


    permissions:
      id-token: write
      contents: read

    env:
      ENV:                 ${{ inputs.environment || 'dev' }}
      AWS_REGION:          eu-central-1
      CONTAINER_NAME:      gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Slack secrets
        env:
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          test -n "${SLACK_APP_TOKEN}"
          test -n "${SLACK_BOT_TOKEN}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/edp-${{ env.ENV }}-github-actions-role
          aws-region:     ${{ env.AWS_REGION }}

      - name: Store Slack tokens in AWS Secrets Manager
        env:
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          aws secretsmanager put-secret-value \
            --secret-id "/edp/${ENV}/slack_mcp/slack_app_token" \
            --secret-string "${SLACK_APP_TOKEN}"

          aws secretsmanager put-secret-value \
            --secret-id "/edp/${ENV}/slack_mcp/slack_bot_token" \
            --secret-string "${SLACK_BOT_TOKEN}"

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: edp-${{ env.ENV }}-slack-mcp-gateway
          IMAGE_TAG:      sha-${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build --target runtime \
            -t "${IMAGE_URI}" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" \
            .
          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "image=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        env:
          TASK_FAMILY: edp-${{ env.ENV }}-slack-mcp-gateway
        run: |
          aws ecs describe-task-definition \
            --task-definition "${TASK_FAMILY}" \
            --query taskDefinition \
            > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy new task definition to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    edp-${{ env.ENV }}-slack-mcp-gateway
          cluster:                    edp-${{ env.ENV }}-slack-mcp-gateway
          wait-for-service-stability: false

      - name: Start gateway service
        run: |
          aws ecs update-service \
            --cluster edp-${ENV}-slack-mcp-gateway \
            --service edp-${ENV}-slack-mcp-gateway \
            --desired-count 1 \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster edp-${ENV}-slack-mcp-gateway \
            --services edp-${ENV}-slack-mcp-gateway

      - name: Deployment summary
        run: |
          echo ""
          echo "Deployed Slack MCP gateway to ECS:"
          echo "  Environment : ${ENV}"
          echo "  Image       : ${{ steps.build-image.outputs.image }}"
          echo "  Cluster     : edp-${ENV}-slack-mcp-gateway"
          echo "  Service     : edp-${ENV}-slack-mcp-gateway"
